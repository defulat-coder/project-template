name: project-template

x-runtime-environment: &runtime-environment
  NODE_ENV: production
  DATABASE_URL: postgresql://project_template:project_template@postgres:5432/project_template?schema=public
  REDIS_URL: redis://redis:6379
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  CLAUDE_AGENT_MODEL: ${CLAUDE_AGENT_MODEL:-claude-sonnet-4-5}

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
    provenance: false
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: project_template
      POSTGRES_PASSWORD: project_template
      POSTGRES_DB: project_template
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_template -d project_template"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    <<: *app-service
    command: pnpm --filter @project-template/api start
    environment:
      <<: *runtime-environment
      API_HOST: 0.0.0.0
      API_PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    <<: *app-service
    command: pnpm --filter @project-template/worker start
    environment:
      <<: *runtime-environment

  web:
    <<: *app-service
    command: pnpm --filter @project-template/web start
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
